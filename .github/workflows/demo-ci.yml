name: Demo CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docs-check:
    name: Check repository guide
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show repository context
        run: |
          echo "Repository: $env:GITHUB_REPOSITORY"
          echo "Event: $env:GITHUB_EVENT_NAME"
          echo "Branch or ref: $env:GITHUB_REF"
          git status --short

      - name: Verify GitHub Actions guide exists
        run: Test-Path docs/github-actions-guide.md

      - name: Verify guide content
        run: Select-String -Path docs/github-actions-guide.md -Pattern "workflow_dispatch" -Quiet
